name: ledgr
description: A production-ready expense tracker application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Utilities
  equatable: ^2.0.5
  intl: ^0.19.0
  uuid: ^4.5.1
  fl_chart: ^0.70.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.3
  share_plus: ^10.0.0
  csv: ^6.0.0
  url_launcher: ^6.3.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true